{% extends 'base.html' %}

{% block content %}
<section class="auth-form">
    <h2>Join the Cult</h2>
    <form method="POST" action="{{ url_for('register') }}">
        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required class="input-field">
        </div>
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required class="input-field">
        </div>
        <div class="form-group">
            <label for="security_question">Security Question:</label>
            <select id="security_question" name="security_question" required class="input-field">
                <option value="first_pet">What was the name of your first pet?</option>
                <option value="first_concert">What was the first concert you attended?</option>
                <option value="favorite_album">What is your favorite doom metal album?</option>
            </select>
        </div>
        <div class="form-group">
            <label for="security_answer">Answer:</label>
            <input type="text" id="security_answer" name="security_answer" required class="input-field">
        </div>
        <button type="submit" class="btn-submit">Sign Up</button>
    </form>
    <p class="auth-link">Already a member? <a href="{{ url_for('login') }}">Enter here</a>.</p>
</section>
{% endblock %}
