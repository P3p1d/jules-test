{% extends 'base.html' %}

{% block content %}
<section class="merch-store">
    <h2>Merch Store</h2>
    <div class="merch-grid">
        {% for item in items %}
        <div class="merch-item">
            <div class="merch-img-container">
                <img src="{{ item.image_url }}" alt="{{ item.name }}" class="merch-img">
            </div>
            <h3 class="merch-name">{{ item.name }}</h3>
            <p class="merch-desc">{{ item.description }}</p>
            <p class="merch-price">${{ item.price }}</p>
            <form action="{{ url_for('add_to_cart', item_id=item._id) }}" method="POST">
                <button type="submit" class="btn-buy">[ ADD TO CART ]</button>
            </form>
        </div>
        {% else %}
        <p>No merch available yet. Check back later.</p>
        {% endfor %}
    </div>
</section>
{% endblock %}
