{% extends 'base.html' %}

{% block content %}
<section class="auth-form">
    <h2>Reset Password</h2>
    <form method="POST" action="{{ url_for('reset_password') }}">
        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required class="input-field">
        </div>
        <div class="form-group">
            <label for="security_answer">Answer to Security Question:</label>
            <input type="text" id="security_answer" name="security_answer" required class="input-field">
        </div>
        <div class="form-group">
            <label for="new_password">New Password:</label>
            <input type="password" id="new_password" name="new_password" required class="input-field">
        </div>
        <button type="submit" class="btn-submit">Reset Password</button>
    </form>
    <p class="auth-link">Remembered it? <a href="{{ url_for('login') }}">Back to Login</a>.</p>
</section>
{% endblock %}
